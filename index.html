<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline</title>
    <meta name="theme-color" content="#FFFFFF" id="theme-color" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/timeline-app/manifest.json" />
    <link rel="icon" href="/timeline-app/favicon.svg" type="image/svg+xml" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-x3DVngXIwMLtAo01e4IWTgbs10zC8TxTqr02N4bEDO4='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function() {
        var r = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (r && r !== location.href && r.indexOf('/timeline-app/') === 0) {
          history.replaceState(null, null, r);
        }
      })();
      // Apply saved theme immediately to prevent flash
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark') document.documentElement.dataset.theme = 'dark';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
